<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מפעל השברים - הוצאת שלמים</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;900&display=swap');
        body { font-family: 'Rubik', sans-serif; }
        
        /* Custom animations */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideDown { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
        .animate-slide-down { animation: slideDown 0.5s ease-out forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- API Key & Helper ---
        const apiKey = ""; // API key is provided by the execution environment

        const delay = (ms) => new Promise(res => setTimeout(res, ms));

        const callGeminiAPI = async (prompt, isJson = false, schema = null) => {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            
            let payload = {
                contents: [{ parts: [{ text: prompt }] }],
            };

            if (isJson && schema) {
                payload.generationConfig = {
                    responseMimeType: "application/json",
                    responseSchema: schema
                };
            }

            let retries = 5;
            let backoff = 1000;

            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    
                    const data = await response.json();
                    const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    
                    if (!text) throw new Error("No text in response");

                    return isJson ? JSON.parse(text) : text;
                } catch (error) {
                    if (i === retries - 1) {
                        console.error("API Error:", error);
                        throw error;
                    }
                    await delay(backoff);
                    backoff *= 2;
                }
            }
        };

        // --- Reusable UI Components ---
        const Fraction = ({ num, den, size = "normal", textColor = "text-slate-800", borderColor = "border-slate-800" }) => {
            const sizeClasses = {
                small: "text-lg",
                normal: "text-2xl",
                large: "text-5xl"
            };
            return (
                <div className={`inline-flex flex-col items-center justify-center font-bold ${sizeClasses[size]} ${textColor} mx-1`}>
                    <span>{num}</span>
                    <span className={`w-full border-b-[3px] my-[2px] ${borderColor}`}></span>
                    <span>{den}</span>
                </div>
            );
        };

        const MixedNumber = ({ whole, num, den, size = "normal", textColor = "text-slate-800", borderColor = "border-slate-800" }) => {
            const sizeClasses = {
                small: "text-2xl",
                normal: "text-4xl",
                large: "text-6xl"
            };
            // הגדרנו תצוגה משמאל-לימין כדי לקבע את השבר בשמאל ואת השלם בימין
            return (
                <div className="flex items-center gap-2" dir="ltr">
                    {num > 0 && <Fraction num={num} den={den} size={size} textColor={textColor} borderColor={borderColor} />}
                    {whole > 0 && <span className={`font-black ${sizeClasses[size]} ${textColor}`}>{whole}</span>}
                </div>
            );
        };

        // --- Question Banks ---
        const STAGE1_QUESTIONS = [
            { n: 7, d: 2, correctOpt: {w:3, n:1}, options: [{w:2, n:1}, {w:3, n:1}, {w:3, n:2}] },
            { n: 9, d: 4, correctOpt: {w:2, n:1}, options: [{w:2, n:1}, {w:1, n:5}, {w:3, n:1}] },
            { n: 11, d: 3, correctOpt: {w:3, n:2}, options: [{w:4, n:1}, {w:3, n:1}, {w:3, n:2}] },
        ];

        const STAGE2_QUESTIONS = [
            { n: 13, d: 5, correctOpt: {w:2, n:3}, options: [{w:1, n:8}, {w:2, n:3}, {w:3, n:2}] },
            { n: 15, d: 6, correctOpt: {w:2, n:3}, options: [{w:2, n:3}, {w:3, n:1}, {w:1, n:9}] },
            { n: 17, d: 4, correctOpt: {w:4, n:1}, options: [{w:3, n:5}, {w:4, n:3}, {w:4, n:1}] },
        ];

        const DEFAULT_STAGE3_QUESTIONS = [
            { n: 15, d: 4, correctOpt: {w:3, n:3}, options: [{w:3, n:3}, {w:4, n:1}, {w:2, n:7}] },
            { n: 22, d: 5, correctOpt: {w:4, n:2}, options: [{w:4, n:2}, {w:3, n:7}, {w:5, n:2}] },
            { n: 17, d: 3, correctOpt: {w:5, n:2}, options: [{w:5, n:2}, {w:4, n:5}, {w:6, n:1}] },
            { n: 19, d: 6, correctOpt: {w:3, n:1}, options: [{w:3, n:1}, {w:2, n:7}, {w:4, n:1}] },
            { n: 11, d: 2, correctOpt: {w:5, n:1}, options: [{w:5, n:1}, {w:4, n:3}, {w:6, n:1}] },
            { n: 25, d: 8, correctOpt: {w:3, n:1}, options: [{w:3, n:1}, {w:2, n:9}, {w:4, n:1}] }
        ];

        const shuffleArray = (array) => {
            let shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        };

        const getShuffledStage3 = () => DEFAULT_STAGE3_QUESTIONS.map(q => ({
            ...q, 
            options: shuffleArray(q.options)
        }));

        // --- Main App Component ---
        function App() {
            const [gameState, setGameState] = useState('intro'); // intro, stage1, stage1_done, stage2, stage2_done, stage3_setup, stage3, end
            const [currentQuestionIndex, setCurrentQuestionIndex] = useState(0);
            const [feedback, setFeedback] = useState(null); 
            const [score, setScore] = useState(0);
            const [playerName, setPlayerName] = useState("");

            // AI Hint State (Stage 2 & 3)
            const [aiHint, setAiHint] = useState("");
            const [isLoadingHint, setIsLoadingHint] = useState(false);

            // AI Theme State (Stage 3)
            const [userTheme, setUserTheme] = useState("");
            const [isGeneratingTheme, setIsGeneratingTheme] = useState(false);
            const [stage3Questions, setStage3Questions] = useState(getShuffledStage3());
            const [stage3Story, setStage3Story] = useState("פתרו את קודי השברים בעל פה כדי להשלים את המשימה!");
            const [codeName, setCodeName] = useState("הקוד הסודי");
            const [themeError, setThemeError] = useState(false);

            const advanceStage = (nextStage) => {
                setGameState(nextStage);
                setCurrentQuestionIndex(0);
                setFeedback(null);
                setAiHint("");
            };

            const fetchHint = async (question) => {
                setIsLoadingHint(true);
                setAiHint("");
                
                const prompt = `
                I am a student learning fractions. I need help converting the improper fraction ${question.n}/${question.d} to a mixed number.
                Please explain in simple HEBREW how to do it. Use friendly language.
                Structure the explanation simply:
                1. How many times does ${question.d} fit into ${question.n}?
                2. What is the remainder?
                3. What is the final mixed number?
                Keep it to 3-4 short sentences max.
                `;

                try {
                    const hintText = await callGeminiAPI(prompt, false);
                    setAiHint(hintText);
                } catch (err) {
                    setAiHint("אופס! העוזר החכם קצת עמוס כרגע. נסו לחלק את המונה במכנה ולבדוק מה השארית.");
                }
                setIsLoadingHint(false);
            };

            const generateCustomTheme = async () => {
                setIsGeneratingTheme(true);
                setThemeError(false);
                
                const prompt = `
                Create a short, engaging mini-story intro for a kid's math game about fractions.
                The player's name is "${playerName}".
                The theme they chose is: "${userTheme}".
                They need to solve fraction math problems (converting improper fractions to mixed numbers) to succeed in the mission.
                Return ONLY JSON.
                `;

                const schema = {
                    type: "OBJECT",
                    properties: {
                        storyIntro: { type: "STRING", description: "A short 1-2 sentence story intro in Hebrew" },
                        codeName: { type: "STRING", description: "A 2-3 word cool name for the code/mission in Hebrew" }
                    }
                };

                try {
                    const result = await callGeminiAPI(prompt, true, schema);
                    if (result && result.storyIntro && result.codeName) {
                        setStage3Story(result.storyIntro);
                        setCodeName(result.codeName);
                        setStage3Questions(getShuffledStage3());
                        advanceStage('stage3');
                    } else {
                        throw new Error("Invalid format returned");
                    }
                } catch (err) {
                    console.error(err);
                    setThemeError(true);
                    setStage3Questions(getShuffledStage3());
                    setStage3Story("פתרו את קודי השברים בעל פה כדי להשלים את המשימה!");
                    setCodeName("הקוד הסודי");
                }
                setIsGeneratingTheme(false);
            };

            const checkAnswer = (opt, correctOpt, questionsArray, nextStage) => {
                if (opt.w === correctOpt.w && opt.n === correctOpt.n) {
                    setFeedback('correct');
                    setScore(prev => prev + 10);
                    setTimeout(() => {
                        if (currentQuestionIndex < questionsArray.length - 1) {
                            setCurrentQuestionIndex(prev => prev + 1);
                            setFeedback(null);
                            setAiHint("");
                        } else {
                            advanceStage(nextStage);
                        }
                    }, 1500);
                } else {
                    setFeedback('incorrect');
                    setTimeout(() => setFeedback(null), 1000);
                }
            };

            // --- Render Screens ---

            if (gameState === 'intro') {
                return (
                    <div className="min-h-screen bg-sky-100 flex items-center justify-center p-4">
                        <div className="max-w-2xl bg-white rounded-3xl shadow-xl p-8 text-center border-4 border-sky-400 animate-slide-down">
                            <div className="flex justify-center mb-6 relative">
                                <div className="absolute inset-0 flex items-center justify-center opacity-20">
                                    <i className="fas fa-boxes text-[120px] text-sky-500"></i>
                                </div>
                                <i className="fas fa-box-open text-6xl text-sky-600 relative z-10 animate-bounce"></i>
                            </div>
                            <h1 className="text-4xl md:text-5xl font-black text-slate-800 mb-4 tracking-tight">
                                מפעל השברים
                            </h1>
                            <p className="text-xl text-slate-600 mb-8 font-medium">
                                ברוכים הבאים למפעל! עזרו לנו לארוז את השברים לקופסאות שלמות.
                            </p>
                            
                            <div className="bg-amber-50 rounded-xl p-4 mb-8 inline-block border border-amber-200">
                                <p className="text-amber-800 font-medium flex items-center justify-center gap-2">
                                    <i className="fas fa-robot"></i> במשחק זה משולב עוזר בינה מלאכותית שיעזור לכם! ✨
                                </p>
                            </div>
                            <br/>
                            <input 
                                type="text" 
                                value={playerName}
                                onChange={(e) => setPlayerName(e.target.value)}
                                placeholder="איך קוראים לכם?"
                                className="w-full max-w-sm bg-sky-50 text-slate-800 border-2 border-sky-300 focus:border-sky-500 rounded-xl px-6 py-3 text-xl mb-6 outline-none transition-colors text-center font-bold"
                            />
                            <br/>
                            <button 
                                onClick={() => advanceStage('stage1')}
                                disabled={!playerName.trim()}
                                className="inline-flex items-center gap-2 bg-sky-500 hover:bg-sky-600 disabled:bg-slate-300 disabled:text-slate-500 text-white text-2xl font-bold py-4 px-8 rounded-full transition-transform hover:scale-105 active:scale-95 shadow-lg"
                            >
                                <i className="fas fa-play"></i>
                                בואו נתחיל!
                            </button>
                        </div>
                    </div>
                );
            }

            if (gameState === 'stage1') {
                const q = STAGE1_QUESTIONS[currentQuestionIndex];
                return (
                    <div className="min-h-screen bg-indigo-50 flex flex-col items-center py-10 px-4">
                        <div className="w-full max-w-4xl flex justify-between items-center mb-6">
                            <div className="text-lg font-bold text-indigo-800 bg-indigo-200 px-4 py-2 rounded-full">שלב 1 מתוך 3: מיון מהיר</div>
                            <div className="text-lg font-bold text-slate-700 flex items-center gap-2">
                                <i className="fas fa-star text-yellow-500"></i> נקודות: {score}
                            </div>
                        </div>

                        <div className="text-center mb-8">
                            <h2 className="text-3xl font-bold text-indigo-900 mb-2">איזה מספר מעורב מסתתר כאן?</h2>
                            <p className="text-slate-600">שאלה {currentQuestionIndex + 1} מתוך {STAGE1_QUESTIONS.length}</p>
                        </div>

                        <div className="bg-white rounded-3xl shadow-xl p-10 mb-8 border-4 border-indigo-200 relative overflow-hidden flex flex-col items-center justify-center min-h-[250px] w-full max-w-2xl">
                            {feedback === 'correct' && (
                                <div className="absolute inset-0 bg-green-500/90 z-10 flex flex-col items-center justify-center animate-fade-in text-white">
                                    <i className="fas fa-check text-7xl mb-4"></i>
                                    <h2 className="text-3xl font-bold">כל הכבוד!</h2>
                                </div>
                            )}
                            {feedback === 'incorrect' && (
                                <div className="absolute inset-0 bg-red-500/20 z-10 flex flex-col items-center justify-center">
                                    <i className="fas fa-times text-7xl text-red-500"></i>
                                </div>
                            )}
                            <Fraction num={q.n} den={q.d} size="large" textColor="text-indigo-600" borderColor="border-indigo-600" />
                        </div>

                        <div className="flex gap-4">
                            {q.options.map((opt, idx) => (
                                <button key={idx} onClick={() => checkAnswer(opt, q.correctOpt, STAGE1_QUESTIONS, 'stage1_done')} disabled={feedback !== null}
                                    className="bg-white border-b-8 border-indigo-200 hover:border-indigo-400 hover:-translate-y-1 active:border-b-0 active:translate-y-2 rounded-2xl px-8 py-6 transition-all min-w-[120px] shadow-md flex justify-center">
                                    <MixedNumber whole={opt.w} num={opt.n} den={q.d} />
                                </button>
                            ))}
                        </div>
                    </div>
                );
            }

            if (gameState === 'stage1_done' || gameState === 'stage2_done') {
                const next = gameState === 'stage1_done' ? 'stage2' : 'stage3_setup';
                const msg = gameState === 'stage1_done' ? 'עבודה מצוינת! עכשיו נעבור לאריזה חכמה יותר.' : 'מדהים! הצלחתם להוציא את כל השלמים.';
                return (
                    <div className="min-h-screen bg-green-50 flex flex-col items-center justify-center p-4 text-center">
                        <i className="fas fa-star text-yellow-400 text-8xl mb-6 drop-shadow-lg animate-bounce"></i>
                        <h2 className="text-4xl font-black text-green-800 mb-4">{msg}</h2>
                        <button onClick={() => advanceStage(next)} className="mt-8 bg-green-500 hover:bg-green-600 text-white text-2xl font-bold py-4 px-10 rounded-full shadow-lg transition-transform hover:scale-105 flex items-center gap-3">
                            לשלב הבא <i className="fas fa-arrow-left"></i>
                        </button>
                    </div>
                );
            }

            if (gameState === 'stage2') {
                const q = STAGE2_QUESTIONS[currentQuestionIndex];
                return (
                    <div className="min-h-screen bg-teal-50 flex flex-col items-center py-10 px-4">
                        <div className="w-full max-w-4xl flex justify-between items-center mb-6">
                            <div className="text-lg font-bold text-teal-800 bg-teal-200 px-4 py-2 rounded-full">שלב 2 מתוך 3: אריזת שלמים</div>
                            <div className="text-lg font-bold text-slate-700 flex items-center gap-2">
                                <i className="fas fa-star text-yellow-500"></i> נקודות: {score}
                            </div>
                        </div>

                        <div className="text-center mb-8">
                            <h2 className="text-3xl font-bold text-teal-900 mb-2">כמה שלמים (קופסאות מלאות) יש כאן?</h2>
                            <p className="text-slate-600">שאלה {currentQuestionIndex + 1} מתוך {STAGE2_QUESTIONS.length}</p>
                        </div>

                        <div className="w-full max-w-3xl bg-white rounded-3xl shadow-xl overflow-hidden border-4 border-teal-300 mb-8 relative">
                            <div className="bg-teal-100 p-2 flex justify-between items-center px-4">
                                <span className="font-bold text-teal-800">מחשב אריזה</span>
                                <button onClick={() => fetchHint(q)} disabled={isLoadingHint || feedback !== null} className="bg-teal-500 hover:bg-teal-600 text-white px-4 py-1.5 rounded-full text-sm flex items-center gap-2 font-bold transition-colors">
                                    {isLoadingHint ? <i className="fas fa-spinner fa-spin"></i> : <i className="fas fa-robot"></i>}
                                    עוזר חכם
                                </button>
                            </div>
                            
                            <div className="p-10 flex flex-col items-center relative min-h-[250px]">
                                {aiHint && feedback !== 'correct' && (
                                    <div className="absolute top-4 left-4 right-4 bg-amber-50 border-2 border-amber-300 text-amber-900 p-4 rounded-2xl shadow-lg z-20 flex gap-3 items-start animate-slide-down">
                                        <div className="bg-amber-200 p-2 rounded-full text-amber-700"><i className="fas fa-robot text-xl"></i></div>
                                        <div className="flex-1 text-lg leading-relaxed">{aiHint}</div>
                                        <button onClick={() => setAiHint("")} className="text-amber-400 hover:text-amber-600"><i className="fas fa-times text-xl"></i></button>
                                    </div>
                                )}
                                {feedback === 'correct' && (
                                    <div className="absolute inset-0 bg-green-500/90 z-10 flex flex-col items-center justify-center animate-fade-in text-white">
                                        <i className="fas fa-check text-7xl mb-4"></i><h2 className="text-3xl font-bold">מעולה!</h2>
                                    </div>
                                )}
                                {feedback === 'incorrect' && (
                                    <div className="absolute inset-0 bg-red-500/20 z-10 flex flex-col items-center justify-center"><i className="fas fa-times text-7xl text-red-500"></i></div>
                                )}
                                <Fraction num={q.n} den={q.d} size="large" textColor="text-teal-600" borderColor="border-teal-600" />
                            </div>
                        </div>

                        <div className="flex gap-4">
                            {q.options.map((opt, idx) => (
                                <button key={idx} onClick={() => checkAnswer(opt, q.correctOpt, STAGE2_QUESTIONS, 'stage2_done')} disabled={feedback !== null}
                                    className="bg-white border-b-8 border-teal-200 hover:border-teal-400 hover:-translate-y-1 active:border-b-0 active:translate-y-2 rounded-2xl px-8 py-6 transition-all min-w-[120px] shadow-md flex justify-center">
                                    <MixedNumber whole={opt.w} num={opt.n} den={q.d} textColor="text-teal-900" borderColor="border-teal-900" />
                                </button>
                            ))}
                        </div>
                    </div>
                );
            }

            if (gameState === 'stage3_setup') {
                return (
                    <div className="min-h-screen bg-orange-50 flex flex-col items-center justify-center p-4 font-sans relative overflow-hidden">
                        <div className="absolute top-10 left-10 text-orange-200/50"><i className="fas fa-wand-magic-sparkles text-[200px]"></i></div>
                        <div className="w-full max-w-2xl bg-white rounded-3xl shadow-2xl p-10 border border-orange-200 text-center relative z-10">
                            <div className="inline-block bg-amber-100 text-amber-500 p-4 rounded-full mb-6">
                                <i className="fas fa-magic text-5xl"></i>
                            </div>
                            <h2 className="text-3xl md:text-4xl font-bold text-slate-800 mb-4">בואו נבנה סיפור במיוחד עבורכם! ✨</h2>
                            <p className="text-slate-600 text-lg mb-8">
                                לפני שנפתור את תרגילי השרשרת, כתבו כאן נושא שאתם אוהבים (למשל: כדורגל, גיבורי על, חלל) והבינה המלאכותית שלנו תייצר עבורכם את המשימות!
                            </p>
                            
                            <input type="text" value={userTheme} onChange={(e) => setUserTheme(e.target.value)} placeholder="הקלד נושא אהוב כאן..."
                                className="w-full bg-orange-50 text-slate-800 border-2 border-orange-200 focus:border-amber-400 rounded-xl px-6 py-4 text-xl mb-6 outline-none transition-colors" disabled={isGeneratingTheme} />

                            {themeError && (
                                <p className="text-red-500 mb-4 bg-red-50 p-2 rounded border border-red-200">הייתה שגיאה ביצירת הסיפור. נסו שוב או המשיכו למשחק הרגיל.</p>
                            )}

                            <div className="flex flex-col sm:flex-row gap-4 justify-center">
                                <button onClick={generateCustomTheme} disabled={isGeneratingTheme || !userTheme.trim()}
                                    className="bg-amber-400 hover:bg-amber-500 text-slate-900 font-bold text-xl py-3 px-8 rounded-full transition-all shadow-[0_0_15px_rgba(251,191,36,0.5)] disabled:opacity-50 flex items-center justify-center gap-2">
                                    {isGeneratingTheme ? <><i className="fas fa-spinner fa-spin text-xl"></i> מייצר משימות...</> : <><i className="fas fa-wand-magic-sparkles text-xl"></i> צור לי משימות מותאמות!</>}
                                </button>
                                
                                <button onClick={() => {
                                    setStage3Questions(getShuffledStage3());
                                    setStage3Story("פתרו את קודי השברים בעל פה כדי להשלים את המשימה!");
                                    setCodeName("הקוד הסודי");
                                    advanceStage('stage3');
                                }} disabled={isGeneratingTheme} className="bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold text-xl py-3 px-8 rounded-full transition-all">
                                    דלג (משחק רגיל)
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            if (gameState === 'stage3') {
                const q = stage3Questions[currentQuestionIndex];
                return (
                    <div className="min-h-screen bg-orange-50 flex flex-col items-center py-10 px-4">
                        <div className="w-full max-w-4xl flex justify-between items-center mb-6">
                            <div className="text-lg font-bold text-orange-800 bg-orange-200 px-4 py-2 rounded-full border border-orange-300 shadow-sm">שלב 3 מתוך 3: השלב המתקדם - חישוב בעל פה</div>
                            <div className="text-lg font-bold text-slate-700 flex items-center gap-2">
                                <i className="fas fa-star text-yellow-500"></i> נקודות: {score}
                            </div>
                        </div>

                        <div className="text-center mb-8 max-w-2xl">
                            <h2 className="text-4xl font-bold text-orange-600 mb-3 tracking-wide flex items-center justify-center gap-2">
                                <i className="fas fa-magic"></i> {codeName}
                            </h2>
                            <p className="text-xl text-orange-900 bg-orange-100/80 p-4 rounded-xl border border-orange-200">{stage3Story}</p>
                            <div className="mt-4 text-slate-500 font-medium">משימה {currentQuestionIndex + 1} מתוך {stage3Questions.length}</div>
                        </div>

                        <div className="w-full max-w-3xl bg-white rounded-3xl shadow-xl overflow-hidden border-8 border-orange-300 mb-8 relative">
                            <div className="bg-orange-500 text-white py-2 px-4 flex justify-between items-center font-mono tracking-widest text-sm">
                                <span>{codeName}_SYSTEM</span>
                                <button onClick={() => fetchHint(q)} disabled={isLoadingHint || feedback !== null} className="bg-orange-600 hover:bg-orange-700 text-orange-100 px-3 py-1 rounded-full text-xs flex items-center gap-1 transition-colors disabled:opacity-50">
                                    {isLoadingHint ? <i className="fas fa-spinner fa-spin"></i> : <i className="fas fa-wand-magic-sparkles"></i>} רמז
                                </button>
                            </div>
                            
                            <div className="p-8 flex flex-col items-center relative min-h-[250px]">
                                {aiHint && feedback !== 'correct' && (
                                    <div className="absolute top-4 left-4 right-4 bg-amber-50 border-2 border-amber-300 text-amber-900 p-4 rounded-2xl shadow-lg z-20 flex gap-3 items-start animate-slide-down">
                                        <div className="bg-amber-200 p-2 rounded-full text-amber-700"><i className="fas fa-robot text-xl"></i></div>
                                        <div className="flex-1 text-lg leading-relaxed">{aiHint}</div>
                                        <button onClick={() => setAiHint("")} className="text-amber-400 hover:text-amber-600"><i className="fas fa-times text-xl"></i></button>
                                    </div>
                                )}
                                {feedback === 'correct' && (
                                    <div className="absolute inset-0 bg-green-500/90 z-10 flex flex-col items-center justify-center animate-fade-in text-white">
                                        <i className="fas fa-check text-7xl mb-4"></i><h2 className="text-3xl font-bold">קוד פוצח!</h2>
                                    </div>
                                )}
                                {feedback === 'incorrect' && (
                                    <div className="absolute inset-0 bg-red-500/20 z-10 flex flex-col items-center justify-center"><i className="fas fa-times text-7xl text-red-500"></i></div>
                                )}

                                <div className="text-2xl text-slate-500 mb-4 font-bold mt-4">פצחו את השבר (ללא עזרים!):</div>
                                <div className="bg-orange-50 px-12 py-8 rounded-2xl border-2 border-orange-100 shadow-inner">
                                    <Fraction num={q.n} den={q.d} size="large" textColor="text-orange-600" borderColor="border-orange-600" />
                                </div>
                            </div>
                        </div>

                        <div className="flex flex-wrap justify-center gap-4 w-full max-w-3xl">
                            {q.options.map((opt, idx) => (
                                <button key={idx} onClick={() => checkAnswer(opt, q.correctOpt, stage3Questions, 'end')} disabled={feedback !== null}
                                    className="bg-white border-b-8 border-orange-200 hover:border-orange-400 hover:bg-orange-50 hover:-translate-y-1 active:border-b-0 active:translate-y-2 rounded-2xl px-8 py-6 transition-all min-w-[150px] flex justify-center shadow-md disabled:opacity-50 text-slate-800">
                                    <MixedNumber whole={opt.w} num={opt.n} den={q.d} textColor="text-slate-800" borderColor="border-slate-800" />
                                </button>
                            ))}
                        </div>
                    </div>
                );
            }

            if (gameState === 'end') {
                return (
                    <div className="min-h-screen bg-gradient-to-br from-amber-100 via-orange-50 to-yellow-100 flex flex-col items-center justify-center p-4">
                        <div className="bg-white w-full max-w-3xl rounded-3xl p-2 relative overflow-hidden shadow-[0_20px_50px_rgba(217,119,6,0.2)] animate-slide-down">
                            <div className="border-4 border-double border-amber-400 rounded-2xl p-8 md:p-12 flex flex-col items-center text-center relative z-10 bg-white">
                                <div className="absolute top-0 left-0 w-full h-full opacity-5 pointer-events-none overflow-hidden">
                                    <i className="fas fa-trophy absolute -top-10 -right-10 text-[300px]"></i>
                                    <i className="fas fa-star absolute -bottom-10 -left-10 text-[250px]"></i>
                                </div>
                                
                                <i className="fas fa-medal text-7xl text-amber-500 mb-6 drop-shadow-md"></i>
                                <h1 className="text-5xl md:text-6xl font-black mb-4 text-transparent bg-clip-text bg-gradient-to-r from-amber-500 to-orange-600">
                                    תעודת הוקרה
                                </h1>
                                <div className="h-1 w-32 bg-amber-300 mb-8 rounded-full"></div>
                                
                                <p className="text-2xl text-slate-600 mb-4">מוענקת בזאת בגאווה ל:</p>
                                <p className="text-5xl font-bold text-slate-800 mb-8 border-b-2 border-slate-200 pb-2 px-10">
                                    {playerName}
                                </p>
                                
                                <p className="text-xl text-slate-600 mb-8 max-w-xl leading-relaxed">
                                    על הפגנת יכולות יוצאות דופן במתמטיקה, חשיבה מהירה, וסיום מוצלח של כל משימות "מפעל השברים"!
                                </p>
                                
                                <div className="bg-gradient-to-r from-amber-100 to-orange-100 border-2 border-amber-300 rounded-2xl p-6 mb-10 shadow-inner w-full max-w-md">
                                    <div className="text-lg text-amber-800 font-medium mb-1">ציון סופי</div>
                                    <div className="text-6xl font-black text-amber-600 flex justify-center items-center gap-2">
                                        {score} <i className="fas fa-star text-yellow-500 text-5xl"></i>
                                    </div>
                                </div>

                                <button onClick={() => { setScore(0); setUserTheme(""); advanceStage('intro'); }}
                                    className="bg-slate-800 text-white hover:bg-slate-700 text-xl font-bold py-4 px-10 rounded-full transition-transform hover:scale-105 shadow-lg relative z-20">
                                    משחק חדש
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            return null;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
